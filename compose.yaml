name: meeting-room

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: meeting_room
      POSTGRES_USER: meeting
      POSTGRES_PASSWORD: meeting
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meeting -d meeting_room"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/meeting_room
      DB_USERNAME: meeting
      DB_PASSWORD: meeting
      JWT_SECRET: ${JWT_SECRET:-change-this-demo-secret-key-at-least-32-bytes}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
