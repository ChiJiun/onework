spring:
  datasource:
    url: jdbc:h2:mem:meeting-room;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

app:
  jwt:
    secret: test-secret-key-that-is-at-least-32-bytes-long
    expiration: PT1H
  admin-login:
    allowed-ips: 127.0.0.1,::1,192.168.10.0/24
